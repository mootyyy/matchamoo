<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		body{
			font-family: Arial;
		}
		header{
			background-color:darkblue ;
			color: lightblue;
			text-align: center;
			padding: 20px;
		}
		nav{
			margin: 0;
			width: 100%;
			background-color: lightblue;
		}
		nav ul{
			margin: 0;
			padding: 0;
			list-style: none;
			display: flex;
		}
		nav ul li{
			padding: 10px 20px;
		}
		nav ul li a{
			text-decoration: none;
			color: white;
			font-weight:bold ;
		}
		nav ul li a:hover{
			color: blue;
			background-color: white;
		}
	</style>
</head>
<body>
<header>
	<h1>TOKO PRADIPTATAMA</h1>
	<P>Melayani dengan sepenuh hati</P>
</header>
<nav>
	<ul>
		<li><a href="#">Home</a></li>
		<li><a href="#">Produk</a></li>
		<li><a href="#">Gallery</a></li>
		<li><a href="#">Contacs</a></li>
	</ul>
</nav>
</body>
</html>
